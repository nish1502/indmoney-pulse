name: INDMoney Weekly Product Pulse

on:
  schedule:
    # Runs every Monday at 10:05 AM UTC (3:35 PM IST)
    - cron: '5 10 * * 1'
  workflow_dispatch: # Enable manual trigger from UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run INDMoney Pulse Pipeline
        working-directory: ./backend
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ID: ${{ secrets.EMAIL_ID }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          echo "Starting INDMoney Pulse Pipeline..."
          python trigger_pulse.py
          echo "Pipeline execution completed."
